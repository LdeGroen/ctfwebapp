name: Deploy to Plesk

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production bundle
        run: npm run build
        env:
          # CRA promoveert lint-warnings naar errors als CI=true (GitHub default).
          # We tonen warnings in CI maar laten de build niet falen erop.
          CI: false

      - name: Deploy build/ via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Versleutelde FTP (FTPS-explicit) — stabieler dan plain FTP
          protocol: ftps
          # Plesk gebruikt een eigen cert (*.regelpaneel.com), niet voor ons domein —
          # loose accepteert het zonder strict validation
          security: loose
          # Genoeg tijd voor de eerste full upload
          timeout: 60000
          local-dir: ./build/
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/src/**
